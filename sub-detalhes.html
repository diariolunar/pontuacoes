<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Detalhes do Sub | Central Lunar</title>

  <link rel="icon" type="image/png" href="./assets/logo-lunar.png" />
  <link rel="apple-touch-icon" href="./assets/logo-lunar.png" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div id="header"></div>

  <main class="dashboard-layout">
    <div id="sidebar"></div>

    <section class="dashboard-content">
      <div class="page-title">
        <span class="tag">Detalhes do sub</span>

        <h1 id="subTitulo">Carregando...</h1>

        <p>
          Confira os membros e pontos registrados neste sub durante a semana atual.
        </p>
      </div>

      <div class="page-actions">
        <a href="./subs.html" class="btn secondary">
          Voltar para Subs
        </a>

        <a href="./enviar-sub.html" class="btn secondary">
          Enviar nova ficha
        </a>

        <button type="button" id="limparSubSemanaBtn" class="btn danger">
          Limpar este sub da semana
        </button>
      </div>

      <div class="summary-line">
        <span id="semanaAtualTexto">Semana atual: carregando...</span>
        <span id="totalMembrosTexto">Membros registrados: 0</span>
        <span id="totalPontosTexto">Total de pontos: 0</span>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h2>Membros registrados</h2>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Nome</th>
                <th>User</th>
                <th>Pontos</th>
              </tr>
            </thead>

            <tbody id="subTabela"></tbody>
          </table>
        </div>
      </div>

      <p id="subMessage" class="message"></p>
    </section>
  </main>

  <div id="footer"></div>

  <script type="module" src="./js/core/components.js"></script>
  <script type="module" src="./js/pages/sub-detalhes.js"></script>
</body>
</html>
