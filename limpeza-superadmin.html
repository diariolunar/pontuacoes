<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Limpeza Manual | Central Lunar</title>

  <link rel="icon" type="image/png" href="./assets/logo-lunar.png" />
  <link rel="apple-touch-icon" href="./assets/logo-lunar.png" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div id="header"></div>

  <main class="dashboard-layout">
    <div id="sidebar"></div>

    <section class="dashboard-content">
      <div class="page-title">
        <span class="tag">Superadmin</span>

        <h1>Limpeza Manual</h1>

        <p>
          Veja os registros de movimentação e apague manualmente apenas o que não deve ficar visível.
          Essa tela não altera a Pontuação Geral.
        </p>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h2>Filtros</h2>
        </div>

        <div class="toolbar">
          <div class="field">
            <label for="buscaRegistro">Buscar por nome, user, categoria ou origem</label>
            <input
              type="text"
              id="buscaRegistro"
              placeholder="Ex: RKymae, Nycolle, ajuste, 1000"
            />
          </div>

          <button type="button" id="limparBuscaBtn" class="btn secondary">
            Limpar busca
          </button>
        </div>

        <div class="toolbar">
          <div class="field">
            <label for="filtroColecao">Tipo de registro</label>
            <select id="filtroColecao">
              <option value="todos">Todos</option>
              <option value="historicoPontuacoes">Histórico de Pontuações</option>
              <option value="ajustesManuais">Ajustes Manuais</option>
            </select>
          </div>

          <button type="button" id="recarregarBtn" class="btn secondary">
            Recarregar registros
          </button>
        </div>

        <div class="summary-line">
          <span id="totalRegistrosTexto">Registros encontrados: 0</span>
          <span>A Pontuação Geral não será alterada ao apagar registros daqui</span>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h2>Registros encontrados</h2>
        </div>

        <div id="registrosLista" class="members-admin-list list-mode"></div>

        <p id="limpezaMessage" class="message"></p>
      </div>
    </section>
  </main>

  <div id="footer"></div>

  <script type="module" src="./js/core/components.js"></script>
  <script type="module" src="./js/pages/limpeza-superadmin.js"></script>
</body>
</html>
