<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Dashboard | Central Lunar</title>

  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div id="header"></div>

  <main class="dashboard-layout">
    <div id="sidebar"></div>

    <section class="dashboard-content">
      <div class="page-title">
        <span class="tag">Painel Administrativo</span>

        <h1>Dashboard</h1>

        <p>
          Resumo geral da pontuação da semana atual no Projeto Lunar.
        </p>
      </div>

      <div class="summary-line">
        <span id="semanaAtualTexto">Semana atual: carregando...</span>
      </div>

      <div class="cards-grid dashboard-smart-grid">
        <article class="info-card">
          <h2>Total de pontos da semana</h2>
          <p id="totalPontosSemana">0</p>
        </article>

        <article class="info-card">
          <h2>Membros pontuados</h2>
          <p id="totalMembrosPontuados">0</p>
        </article>

        <article class="info-card">
          <h2>Envios registrados</h2>
          <p id="totalEnviosSemana">0</p>
        </article>

        <article class="info-card">
          <h2>Membro com mais pontos</h2>
          <p id="membroMaisPontos">—</p>
        </article>

        <article class="info-card">
          <h2>Sub que mais pontuou</h2>
          <p id="subMaisPontos">—</p>
        </article>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h2>Últimos envios da semana</h2>
        </div>

        <div id="ultimosEnvios" class="list"></div>
      </div>

      <p id="dashboardMessage" class="message"></p>
    </section>
  </main>

  <div id="footer"></div>

  <script type="module" src="./js/core/components.js"></script>
  <script type="module" src="./js/pages/admin.js"></script>
</body>
</html>
