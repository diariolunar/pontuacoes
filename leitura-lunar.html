<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Leitura Lunar | Central Lunar</title>

  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div id="header"></div>

  <main class="dashboard-layout">
    <div id="sidebar"></div>

    <section class="dashboard-content">
      <div class="page-title">
        <span class="tag">Painel da Leh</span>

        <h1>Leitura Lunar</h1>

        <p>
          Confira os membros registrados na Leitura Lunar da semana atual.
        </p>
      </div>

      <div class="page-actions">
        <a href="./enviar-leitura-lunar.html" class="btn secondary">
          Enviar nova lista
        </a>
      </div>

      <div class="summary-line">
        <span id="semanaAtualTexto">Semana atual: carregando...</span>
        <span id="totalMembrosTexto">Membros registrados: 0</span>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h2>Participantes da Leitura Lunar</h2>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Nome</th>
                <th>User</th>
                <th>Pontos</th>
              </tr>
            </thead>

            <tbody id="leituraTabela"></tbody>
          </table>
        </div>
      </div>

      <p id="leituraMessage" class="message"></p>
    </section>
  </main>

  <div id="footer"></div>

  <script type="module" src="./js/core/components.js"></script>
  <script type="module" src="./js/pages/leitura-lunar.js"></script>
</body>
</html>
