<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Enviar Chuva de Estrelas | Central Lunar</title>

  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div id="header"></div>

  <main class="page">
    <section class="form-container">
      <span class="tag">Envio de participação</span>

      <h1>Enviar Chuva de Estrelas</h1>

      <p>
        Cole a lista de membros que fizeram a Chuva de Estrelas. Cada membro receberá
        automaticamente 100 pontos na pontuação da semana.
      </p>

      <form id="chuvaForm" class="form">
        <div class="field">
          <label for="listaTexto">Cole aqui a lista de membros</label>
          <textarea
            id="listaTexto"
            placeholder="Ex:
Mayke Arrais - RKymae
Leh - userdaleh
Anna - userdaanna

Ou:
Nome: Mayke Arrais
User: RKymae"
          ></textarea>
        </div>

        <button type="button" id="lerListaBtn" class="btn secondary full">
          Ler lista automaticamente
        </button>

        <div class="members-box">
          <div class="members-header">
            <h2>Membros encontrados</h2>

            <button type="button" id="addMemberBtn" class="btn secondary small">
              + Adicionar membro
            </button>
          </div>

          <div id="membersList"></div>
        </div>

        <button type="submit" class="btn primary full">
          Enviar Chuva de Estrelas
        </button>
      </form>

      <p id="chuvaMessage" class="message"></p>
    </section>
  </main>

  <div id="footer"></div>

  <script type="module" src="./js/core/components.js"></script>
  <script type="module" src="./js/pages/enviar-chuva-estrelas.js"></script>
</body>
</html>
