<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Cadastros | Central Lunar</title>

  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div id="header"></div>

  <main class="dashboard-layout">
    <div id="sidebar"></div>

    <section class="dashboard-content">
      <div class="page-title">
        <span class="tag">Superadmin</span>

        <h1>Cadastros</h1>

        <p>
          Gerencie os acessos administrativos do sistema. Usuários ocultos não aparecem nesta lista.
        </p>
      </div>

      <div class="summary-line">
        <span id="totalCadastrosTexto">Cadastros encontrados: 0</span>
        <span>Acesso permitido apenas para superadmin</span>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h2>Usuários administrativos</h2>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Nome</th>
                <th>Email</th>
                <th>Acesso</th>
                <th>Status</th>
              </tr>
            </thead>

            <tbody id="cadastrosTabela"></tbody>
          </table>
        </div>
      </div>

      <p id="cadastrosMessage" class="message"></p>
    </section>
  </main>

  <div id="footer"></div>

  <script type="module" src="./js/core/components.js"></script>
  <script type="module" src="./js/pages/cadastros.js"></script>
</body>
</html>
