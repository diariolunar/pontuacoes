<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Membros | Central Lunar</title>

  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div id="header"></div>

  <main class="dashboard-layout">
    <div id="sidebar"></div>

    <section class="dashboard-content">
      <div class="page-title">
        <span class="tag">Painel da Leh</span>

        <h1>Membros</h1>

        <p>
          Consulte, cadastre, edite e exclua membros do sistema.
        </p>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h2>Cadastrar novo membro</h2>
        </div>

        <form id="novoMembroForm" class="member-create-form">
          <div class="field">
            <label for="novoNome">Nome</label>
            <input
              type="text"
              id="novoNome"
              placeholder="Ex: Mayke Arrais"
              required
            />
          </div>

          <div class="field">
            <label for="novoUser">User</label>
            <input
              type="text"
              id="novoUser"
              placeholder="Ex: @RKymae"
              required
            />
          </div>

          <button type="submit" class="btn primary">
            Cadastrar membro
          </button>
        </form>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h2>Buscar membro</h2>
        </div>

        <div class="toolbar">
          <div class="field">
            <label for="buscaMembro">Nome ou user</label>
            <input
              type="text"
              id="buscaMembro"
              placeholder="Ex: Mayke, RKymae ou @RKymae"
            />
          </div>

          <button type="button" id="limparBuscaBtn" class="btn secondary">
            Limpar busca
          </button>
        </div>

        <div class="summary-line">
          <span id="totalMembrosTexto">Membros encontrados: 0</span>
          <span>Excluir membro não apaga o histórico de pontuação</span>
        </div>
      </div>

      <div id="membrosLista" class="members-admin-list list-mode"></div>

      <p id="membrosMessage" class="message"></p>
    </section>
  </main>

  <div id="footer"></div>

  <script type="module" src="./js/core/components.js"></script>
  <script type="module" src="./js/pages/membros.js"></script>
</body>
</html>
