<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Teste Leitura Lunar</title>

  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div id="header"></div>

  <main class="page">
    <section class="form-container">
      <span class="tag">Teste</span>

      <h1>Teste da Leitura Lunar</h1>

      <p>
        Esta página é só para testar se o JavaScript está carregando.
      </p>

      <form id="leituraForm" class="form">
        <div class="field">
          <label for="listaTexto">Cole aqui a lista de membros</label>
          <textarea
            id="listaTexto"
            placeholder="Mayke Arrais - RKymae"
          ></textarea>
        </div>

        <button type="button" id="lerListaBtn" class="btn secondary full">
          Ler lista automaticamente
        </button>

        <div class="members-box">
          <div class="members-header">
            <h2>Membros encontrados</h2>

            <button type="button" id="addMemberBtn" class="btn secondary small">
              + Adicionar membro
            </button>
          </div>

          <div id="membersList"></div>
        </div>

        <button type="submit" class="btn primary full">
          Enviar Leitura Lunar
        </button>
      </form>

      <p id="leituraMessage" class="message"></p>
    </section>
  </main>

  <div id="footer"></div>

  <script>
    alert("O HTML novo da Leitura Lunar foi carregado.");

    document.addEventListener("DOMContentLoaded", function () {
      const leituraMessage = document.getElementById("leituraMessage");
      const lerListaBtn = document.getElementById("lerListaBtn");

      leituraMessage.textContent = "O JavaScript dentro do HTML funcionou.";
      leituraMessage.className = "message success";

      lerListaBtn.addEventListener("click", function () {
        alert("O botão Ler Lista funcionou pelo script interno.");

        leituraMessage.textContent = "Botão funcionando. O problema está no arquivo JS externo ou no caminho dele.";
        leituraMessage.className = "message success";
      });
    });
  </script>

  <script type="module" src="./js/core/components.js"></script>
  <script type="module" src="./js/pages/enviar-leitura-lunar.js"></script>
</body>
</html>
